name: Build and Push Docker Image

on:
  push:
    branches: [ "main", "master" ] # 当推送到 main 或 master 分支时触发

env:
  REGISTRY: ghcr.io
  # ⚠️ 重要：将下面换成你的 GitHub 用户名（必须全部小写）
  IMAGE_NAME: responsewrite/paper-analyzer-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 允许工作流向 GitHub Packages 推送镜像

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 设置 QEMU 以支持构建 ARM64 架构的镜像
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 设置 Docker Buildx (多架构构建工具)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 自动登录到 GitHub 自己的容器镜像库 (GHCR)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 构建并推送
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64 # 明确指定为你的 Orange Pi 构建 ARM64 版本
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
